#cloud-config

# Ubuntu Technitium DNS profile for Proxmox cloud images.
# After first boot, access the web console at http://<server-ip>:5380 and change default admin credentials.
package_update: true
packages:
 - qemu-guest-agent
 - zip
 - unzip
 - curl
 - wget
 - net-tools
 - openssh-server
 - ca-certificates
 - gnupg
 - lsb-release
 - software-properties-common
 - dnsutils

# Technitium needs DNS port 53, so disable systemd-resolved before install.
runcmd:
 - systemctl enable --now qemu-guest-agent
 - systemctl disable --now systemd-resolved || true
 - rm -f /etc/resolv.conf
 - printf "nameserver 1.1.1.1\nnameserver 8.8.8.8\n" > /etc/resolv.conf
 - curl -sSL https://download.technitium.com/dns/install.sh | bash
 - systemctl enable --now dns.service
 - printf "nameserver 127.0.0.1\nnameserver 1.1.1.1\n" > /etc/resolv.conf
 - systemctl restart dns.service