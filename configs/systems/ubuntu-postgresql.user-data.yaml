#cloud-config

# Ubuntu cloud-init profile with PostgreSQL 18 from PGDG
package_update: true
packages:
 - qemu-guest-agent
 - zip
 - unzip
 - curl
 - wget
 - net-tools
 - openssh-server
 - ca-certificates
 - gnupg
 - lsb-release
 - software-properties-common
 - postgresql-common

# Enable qemu guest agent and install PostgreSQL 18 from apt.postgresql.org.
runcmd:
 - systemctl enable --now qemu-guest-agent
 - install -d /usr/share/postgresql-common/pgdg
 - curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
 - . /etc/os-release && echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" > /etc/apt/sources.list.d/pgdg.list
 - apt-get update
 - DEBIAN_FRONTEND=noninteractive apt-get install -y postgresql-18 postgresql-contrib-18
 - systemctl enable --now postgresql
 - psql --version